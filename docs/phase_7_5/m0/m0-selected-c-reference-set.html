<title>HS360 M0 Selected Direction C Reference Set</title>
<style>

    --surface: #fffdf9;
    --soft: #f8f2e9;

  .desktop {

  .desktop.collapsed { grid-template-columns: 1fr 76px; width: 1180px; height: 820px; }
  .desktop.ltr { grid-template-columns: 252px 1fr; }

  .workspace { min-width: 0; display: grid; grid-template-rows: 72px 54px 1fr; direction: rtl; }
  .top {

    align-items: center;
    gap: 12px;
    padding: 0 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);

  .search {

    align-items: center;
    gap: 8px;
    padding: 0 13px;

    background: var(--soft);
    color: var(--muted);
    font-size: 12px;
  }
  .quick, .outline-btn, .icon-btn {

    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .quick { border: 0; padding: 0 15px; color: #fff; background: var(--action); font-weight: 700; }
  .outline-btn { padding: 0 13px; border: 1px solid var(--line); color: var(--ink); background: var(--surface); }
  .icon-btn { width: 40px; border: 1px solid var(--line); color: var(--ink); background: var(--surface); position: relative; }
  .unread { position: absolute; width: 7px; height: 7px; border-radius: 50%; background: var(--error); top: 7px; inset-inline-start: 8px; outline: 2px solid var(--surface); }
  .tabs {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow: hidden;
  }
  .tab { padding: 8px 13px; border-radius: 18px; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .tab.on { color: #fff; background: var(--action); font-weight: 700; }
  .page { padding: 24px 28px 28px; overflow: hidden; }
  .page-head { display: flex; align-items: end; gap: 12px; margin-bottom: 17px; }
  .page-head h1 { margin: 0 0 3px; font-size: 24px; }
  .page-head p { margin: 0; color: var(--muted); font-size: 12px; }
  .page-actions { margin-inline-start: auto; display: flex; gap: 8px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin-bottom: 16px; }
  .card, .panel {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 18px;
  }
  .card { padding: 15px 17px; min-height: 112px; }
  .card-label { color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 8px; }
  .card-value { font-size: 24px; font-weight: 700; margin: 10px 0 2px; }
  .card-note { color: var(--muted); font-size: 11px; }
  .good { color: var(--success); font-weight: 700; }
  .warn { color: var(--warning); font-weight: 700; }
  .bad { color: var(--error); font-weight: 700; }
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--surface);
  }
  .field {
    min-width: 210px;
    height: 36px;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 11px;
    border: 1px solid var(--line);
    border-radius: 11px;
    color: var(--muted);
    background: var(--soft);
    font-size: 11px;
  }
  .field.small { min-width: 130px; }
  .result-count { margin-inline-start: auto; color: var(--muted); font-size: 11px; }
  .table-wrap { border: 1px solid var(--line); border-radius: 18px; background: var(--surface); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { padding: 11px 13px; color: var(--muted); background: var(--soft); text-align: start; font-weight: 700; }
  td { padding: 12px 13px; border-top: 1px solid var(--line); vertical-align: middle; }

  .status { display: inline-flex; padding: 4px 8px; border-radius: 999px; font-size: 9px; font-weight: 700; }
  .status.ok { color: var(--success); background: rgba(45,122,79,.1); }
  .status.wait { color: var(--warning); background: rgba(176,109,17,.1); }
  .status.info { color: var(--info); background: rgba(58,111,143,.1); }
  .status.off { color: var(--muted); background: var(--soft); }
  .two-col { display: grid; grid-template-columns: 1.45fr .75fr; gap: 15px; direction: ltr; }
  .panel { padding: 17px; direction: rtl; }
  .panel-title { display: flex; align-items: center; margin-bottom: 12px; font-size: 14px; font-weight: 700; }
  .panel-link { margin-inline-start: auto; color: var(--action); font-size: 10px; }
  .line-item { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .line-item:last-child { border-bottom: 0; }
  .line-item strong { font-size: 11px; }
  .line-item small { display: block; color: var(--muted); font-size: 10px; margin-top: 3px; }

  .side {
    direction: rtl;
    padding: 18px 14px 15px;
    display: flex;
    flex-direction: column;
    background: var(--sidebar);
    border-inline-start: 1px solid rgba(100,80,55,.15);
  }
  .brand { height: 58px; display: flex; align-items: center; gap: 10px; padding: 0 9px 13px; border-bottom: 1px solid rgba(100,80,55,.14); margin-bottom: 13px; }
  .brand img { width: 39px; height: 39px; object-fit: contain; }
  .brand strong { display: block; font-family: "Noto"; font-size: 15px; }
  .brand small { display: block; color: var(--muted); font-size: 9px; margin-top: 2px; }
  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-row { min-height: 42px; display: flex; align-items: center; gap: 11px; padding: 0 11px; border-radius: 13px; color: var(--muted); font-size: 12px; }
  .nav-row.on { color: #fff; background: var(--action); font-weight: 700; }
  .nav-row.dim { opacity: .42; }
  .later { margin-inline-start: auto; font-size: 8px; border: 1px solid currentColor; border-radius: 10px; padding: 1px 5px; }
  .side-bottom { margin-top: auto; }
  .side-line { height: 1px; background: rgba(100,80,55,.14); margin: 9px 7px; }
  .profile { display: grid; grid-template-columns: 36px 1fr 18px; gap: 8px; align-items: center; padding: 10px; border-radius: 15px; background: rgba(201,169,97,.11); }
  .avatar { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 50%; color: #1a1a1a; background: var(--brand); font-weight: 700; }

  .collapsed .nav-row { justify-content: center; padding: 0; }

  .detail-title { display: flex; align-items: center; gap: 10px; }
  .detail-code { font-family: "Noto"; direction: ltr; }

  .info-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0 18px; }
  .info { padding: 12px 0; border-bottom: 1px solid var(--line); direction: rtl; }
  .info small { display: block; color: var(--muted); font-size: 10px; margin-bottom: 4px; }
  .info strong { font-size: 12px; }
  .timeline { position: relative; padding-inline-start: 18px; }
  .timeline::before { content: ""; position: absolute; inset-inline-start: 4px; top: 6px; bottom: 8px; width: 1px; background: var(--line); }
  .event { position: relative; padding: 0 0 18px; }
  .event::before { content: ""; position: absolute; inset-inline-start: -17px; top: 5px; width: 9px; height: 9px; border-radius: 50%; background: var(--action); outline: 4px solid var(--soft); }
  .event strong { font-size: 11px; }
  .event small { display: block; color: var(--muted); font-size: 9px; margin-top: 3px; }

  .mobile {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    direction: rtl;
    background: var(--canvas);
    border-radius: 34px;
    color: var(--ink);
  }
  .mobile-head { height: 96px; padding: 22px 20px 13px; display: flex; align-items: end; background: var(--sidebar); }
  .mobile-head small { display: block; color: var(--muted); font-size: 10px; margin-bottom: 3px; }
  .mobile-head strong { font-size: 17px; }
  .mobile-head .avatar { margin-inline-start: auto; }
  .mobile-content { height: 676px; padding: 18px 17px 100px; overflow: hidden; }
  .mobile-summary { padding: 15px; border: 1px solid var(--line); border-radius: 20px; background: var(--surface); margin-bottom: 14px; }
  .mobile-summary h2 { margin: 0 0 4px; font-size: 19px; }
  .mobile-summary p { margin: 0; color: var(--muted); font-size: 10px; }
  .progress { display: flex; height: 7px; border-radius: 5px; overflow: hidden; background: var(--soft); margin-top: 13px; }
  .progress span { width: 58%; background: var(--success); }
  .mobile-card { padding: 14px; border: 1px solid var(--line); border-radius: 18px; background: var(--surface); margin-bottom: 10px; }
  .mobile-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .mobile-time { color: var(--action); font-family: "Noto"; font-size: 11px; }
  .mobile-card strong { font-size: 12px; }
  .mobile-card p { margin: 4px 0 11px; color: var(--muted); font-size: 10px; }
  .mobile-actions { display: flex; gap: 7px; }
  .mobile-action { flex: 1; height: 34px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 11px; background: var(--soft); color: var(--ink); font-size: 10px; font-weight: 700; }
  .mobile-action.primary { color: #fff; background: var(--action); border-color: var(--action); }
  .bottom {
    position: absolute;
    inset: auto 0 0;
    height: 72px;
    display: grid;
    grid-template-columns: repeat(5,1fr);
    padding: 8px 8px 7px;
    background: var(--surface);
    border-top: 1px solid var(--line);
  }
  .bottom-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--muted); font-size: 8px; }
  .bottom-item .sym { font-size: 16px; }
  .bottom-item.on { color: var(--action); font-weight: 700; }
  .approval { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .approval:last-child { border-bottom: 0; }
  .approval strong { font-size: 11px; }
  .approval small { display: block; color: var(--muted); font-size: 9px; margin-top: 3px; }

  .reference-mark { position: absolute; left: 15px; bottom: 10px; color: var(--muted); font-family: "Noto"; font-size: 8px; letter-spacing: .4px; }
  .mobile-pair { width: 820px; height: 844px; display: flex; gap: 40px; background: #ded7cd; }

  const finance = `
    <div class="desktop">
      <main class="workspace">${topbar("المالية", "المالية ‹ نظرة عامة")}
